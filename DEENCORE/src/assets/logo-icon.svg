<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none" role="img" aria-label="DeenCore">
  <title>DeenCore</title>
  <defs>
    <mask id="cres-mask">
      <circle cx="32" cy="38" r="18" fill="white"/>
      <circle cx="40" cy="31" r="17" fill="black"/>
    </mask>
    <radialGradient id="icon-bg" cx="35%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#183d6b"/>
      <stop offset="100%" stop-color="#071624"/>
    </radialGradient>
    <filter id="star-glow" color-interpolation-filters="sRGB" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cres-glow" color-interpolation-filters="sRGB" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ring-glow" color-interpolation-filters="sRGB" x="-4%" y="-4%" width="108%" height="108%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="36" cy="36" r="36" fill="url(#icon-bg)"/>
  <circle cx="36" cy="36" r="34.5" stroke="#5d9d94" stroke-width="1.5" opacity="0.7" filter="url(#ring-glow)"/>
  <circle cx="36" cy="36" r="27.5" stroke="#5d9d94" stroke-width="0.5" opacity="0.25" stroke-dasharray="2.5 5.5"/>
  <circle cx="32" cy="38" r="18" fill="#d4a853" filter="url(#cres-glow)" mask="url(#cres-mask)"/>
  <circle cx="32" cy="38" r="18" stroke="#f0cb76" stroke-width="0.7" opacity="0.4" mask="url(#cres-mask)"/>
  <path fill="#d4a853" filter="url(#star-glow)"
    d="M54,13.5 L55.56,16.44 L57.89,14.11 L56.44,17.44 L59.5,19
       L56.44,20.56 L57.89,23.89 L55.56,21.56 L54,24.5
       L52.44,21.56 L50.11,23.89 L51.56,20.56 L48.5,19
       L51.56,17.44 L50.11,14.11 L52.44,16.44 Z"/>
  <line x1="14" y1="61" x2="58" y2="61" stroke="#5d9d94" stroke-width="0.7" opacity="0.3"/>
</svg>